    // Сұрақтарды 150-ге толтыру үшін мәтіннен алынған деректер:
    const extraData = [
        ["Дауыл болмай ... болмас", "жауын"], ["Дау болмай ... болмас", "мамын"],
        ["Хан - қазына, би - ...", "құлпы"], ["Әділ би - елдің ...", "құты"],
        ["Биліксіз биден ... азар", "ел"], ["Жаманды жақсы деу - ...", "надандық"],
        ["Кезбе сөзге ... сенбе", "құлпыша"], ["Майқы би қай ғасырда өмір сүрген?", "XI-XIII"],
        ["Майқының әкесінің аты?", "Төбей"], ["Майқының бабасының аты?", "Кейкі"],
        ["«Майқы бидің таңбалы тасы» қайда?", "Ұлытауда"], ["Неше руға таңба берген?", "40 руға"],
        ["Үйсінге қандай таңба берді?", "Жалау"], ["Арғынға қандай таңба берді?", "Көз"],
        ["Алшынға қандай таңба берді?", "Найза"], ["«Яссы» ілімі нені білдіреді?", "Жасау ізі"],
        ["Майқы биді кімге теңейді?", "Дала Аристотеліне"]
    ];

    // Сұрақтарды автоматты түрде көбейту логикасы (үлгі ретінде)
    while(questions.length < 150) {
        let item = extraData[questions.length % extraData.length];
        questions.push({
            q: item[0].includes("?") ? item[0] : `Сөйлемді толықтырыңыз: "${item[0]}"`,
            a: item[1],
            o: [item[1], "Басқа", "Қате жауап", "Белгісіз"].sort(() => Math.random() - 0.5)
        });
    }

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        if (currentIdx >= questions.length) {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('score-container').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            return;
        }
        const q = questions[currentIdx];
        document.getElementById('current-num').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.a);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        if (answered) return;
        answered = true;
        const buttons = document.querySelectorAll('.option-btn');
        if (selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => { if (b.innerText === correct) b.classList.add('correct'); });
        }
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1500);
    }

    loadQuestion();
</script>
