<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Майқы би мұрасы - Интеллектуалды Тест</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #quiz-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 30px; font-size: 28px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .progress { margin-bottom: 20px; font-size: 16px; color: #7f8c8d; font-weight: bold; }
        .question { font-size: 22px; font-weight: 600; margin-bottom: 30px; color: #34495e; line-height: 1.4; }
        .options { display: grid; gap: 15px; }
        .option-btn { padding: 15px 20px; border: 2px solid #ecf0f1; border-radius: 12px; background: #fff; cursor: pointer; transition: all 0.2s ease; font-size: 17px; text-align: left; outline: none; }
        .option-btn:hover:not([disabled]) { background: #f8f9fa; border-color: #3498db; transform: translateY(-2px); }
        .correct { background-color: #2ecc71 !important; border-color: #27ae60 !important; color: white !important; }
        .wrong { background-color: #e74c3c !important; border-color: #c0392b !important; color: white !important; }
        #score-container { display: none; }
        .final-score { font-size: 48px; color: #2ecc71; font-weight: bold; margin: 20px 0; }
        .restart-btn { margin-top: 30px; padding: 15px 40px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; }
        .restart-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-content">
        <h1>Майқы би мұрасы</h1>
        <div class="progress" id="progress">Сұрақ: 1 / 150</div>
        <div class="question" id="question">Жүктелуде...</div>
        <div class="options" id="options"></div>
    </div>

    <div id="score-container">
        <h1>Тест аяқталды!</h1>
        <div class="final-score" id="final-score">0</div>
        <p id="score-text" style="font-size: 18px; color: #7f8c8d;"></p>
        <button class="restart-btn" onclick="location.reload()">Қайта бастау</button>
    </div>
</div>

<script>
const questions = [
    { question: "Майқы бидің «Билік» ілімінің ең алғашқы негізін қалаушы кім?", options: ["Алтай дана би", "Арыс би", "Төле би", "Әйтеке би"], answer: 0 },
    { question: "«Билік» ілімін бір жүйеге келтірген тұлға?", options: ["Шыңғыс хан", "Арыс би", "Майқы би", "Алаша хан"], answer: 1 },
    { question: "Майқы би бойынша: «Би екеу болса, дау ... болады».", options: ["Біреу", "Екеу", "Төртеу", "Бесеу"], answer: 2 },
    { question: "Билер саны неге тақ болуы керек?", options: ["Салт бойынша", "Төрелік айтатын үшінші адам болуы үшін", "Ханның бұйрығы", "Көп көріну үшін"], answer: 1 },
    { question: "Шыңғыс ханды ақ киізге көтеріп хан сайлауға неше би қатысқан?", options: ["3 би", "7 би", "9 би", "12 би"], answer: 3 },
    { question: "«Биде қырық кісінің ... бар».", options: ["Күші", "Малы", "Ары", "Ақылы"], answer: 2 },
    { question: "Майқы бидің «Қызыл тіл» концепциясы нені меңзейді?", options: ["Тілдің түсін", "Шешендік пен дипломатиялық тілді", "Жалған сөйлеуді", "Тек заңды"], answer: 1 },
    { question: "Майқы би бойынша «Ақ сүйек» (аристократ) деп кімдерді атаған?", options: ["Тек байларды", "Ел билеген рухани элитаны", "Шетелдіктерді", "Батырларды"], answer: 1 },
    { question: "Майқы бидің шын есімі?", options: ["Ұран", "Төбей", "Кейкі", "Бабыралы"], answer: 0 },
    { question: "Майқы бидің әкесінің аты?", options: ["Кейкі", "Төбей", "Арыс", "Үйсін"], answer: 1 },
    { question: "«Түгел сөздің түбі бір, түп атасы – ...»", options: ["Алаш", "Алаша хан", "Майқы би", "Үйсін"], answer: 2 },
    { question: "Майқы би 40 руға таңбаны қай жерде берген?", options: ["Түркістанда", "Ұлытауда", "Алтайда", "Жетісуда"], answer: 1 },
    { question: "Үйсін руына қандай таңба берілді?", options: ["Жалау", "Көз", "Найза", "Шөміш"], answer: 0 },
    { question: "Арғын руына қандай таңба берілді?", options: ["Көз", "Тарақ", "Балға", "Ай"], answer: 0 },
    { question: "Алшын руына қандай таңба берілді?", options: ["Найза", "Қылыш", "Оқ", "Садақ"], answer: 0 },
    { question: "Майқы бидің болжамындағы «Жансыз арба» не?", options: ["Арба", "Автокөлік", "Пойыз", "Ұшақ"], answer: 1 },
    { question: "«Темірден құс болады» дегені не?", options: ["Зымыран", "Тікұшақ", "Ұшақ", "Сенімсіздік"], answer: 2 },
    { question: "«Базарында сұйылып ... сатылар».", options: ["Су", "Сүт", "Мұнай", "Май"], answer: 1 },
    { question: "«Естіге айтқан тура сөз – ... тіккен тумен тең».", options: ["Төбеге", "Шыңға", "Үйге", "Жерге"], answer: 1 },
    { question: "«Есерге айтқан тура сөз – ... сіңген сумен тең».", options: ["Тасқа", "Құмға", "Жерге", "Көлге"], answer: 1 },
    { question: "«Би болмасаң да, ... бол».", options: ["Бай", "Би түсетін үй", "Шешен", "Батыр"], answer: 1 },
    { question: "«Ақтық болмай ... болмас».", options: ["Тірлік", "Бірлік", "Байлық", "Елдік"], answer: 1 },
    { question: "«Жігітке жар қымбат, ... қымбат».", options: ["Мал мен мүлік", "Намыс пен ар", "Ат пен шапан", "Дос"], answer: 1 },
    { question: "«Ұят – жаман ойдың ...».", options: ["Қақпағы", "Жүгені", "Тұсауы", "Өлшемі"], answer: 1 },
    { question: "«Дауыл болмай ... болмас».", options: ["Жауын", "Боран", "Дау", "Өмір"], answer: 0 },
    { question: "«Жіңішкені үзу оңай, ... таптау оңай».", options: ["Әлсізді", "Жұқаны", "Момынды", "Кішіні"], answer: 1 },
    { question: "Майқы би бойынша елге не құт?", options: ["Бай", "Би", "Хан", "Батыр"], answer: 1 },
    { question: "Ердің құты қайда?", options: ["Түзде", "Үйінде", "Атында", "Тілінде"], answer: 1 },
    { question: "Майқы би қай ханның бас уәзірі болған?", options: ["Абылай хан", "Шыңғыс хан", "Тәуке хан", "Жәнібек хан"], answer: 1 },
    { question: "«Ақ сауыт» – ... оқ өтпесе.", options: ["Атқанда", "Шапқанда", "Көргенде", "Кигенде"], answer: 0 },
    { question: "«Арғымақ» – ... жылқы жетпесе.", options: ["Шапқанда", "Желгенде", "Қуғанда", "Көргенде"], answer: 1 },
    { question: "«Ақылды» – тозған елді ...", options: ["Билесе", "Септесе", "Байытса", "Қорғаса"], answer: 1 },
    { question: "«Ер жігіт» – жауға тастап ...", options: ["Қашпаса", "Кетпесе", "Бермесе", "Өлмесе"], answer: 1 },
    { question: "Болжам: «Еркек жасып ... болар».", options: ["Құл", "Ит", "Тұл", "Жат"], answer: 1 },
    { question: "Болжам: «Қатын тұлданып ... болар».", options: ["Би", "Құл", "Бай", "Мұң"], answer: 0 },
    { question: "«Төсекке ... жатарсың».", options: ["Есеппен", "Алаңдап", "Ұйқысыз", "Кеш"], answer: 0 },
    { question: "Болжам: «Баққаның ... болар».", options: ["Мал", "Өсек", "Бала", "Жер"], answer: 1 },
    { question: "«Жер ... болар, жұрт пақыр болар».", options: ["Тақыр", "Кең", "Тар", "Жасыл"], answer: 0 },
    { question: "Билікке келетін адамға қойылған басты талап?", options: ["Жеті ата мен жеті жұрттың тілін білу", "Байлық", "Күш", "Атақ"], answer: 0 },
    { question: "«Тіл жүйрік емес, ... жүйрік».", options: ["Ат", "Ой", "Сөз", "Құс"], answer: 1 },
    { question: "«Көзі шегір, өзі жемір жау» деп кімдерді айтты?", options: ["Қытайларды", "Отаршылдарды", "Жоңғарларды", "Қалмақтарды"], answer: 1 },
    { question: "Майқы би дүние неше жылдан кейін тәмәм болады деді?", options: ["1000", "2000", "4000", "5000"], answer: 2 },
    { question: "«Жеңіс түбі – ...»", options: ["Ерлік", "Бірлік", "Сабыр", "Күш"], answer: 0 },
    { question: "«Қанағатсыз ... атын сойғызар».", options: ["Жалғыз", "Сегіз", "Семіз", "Жүйрік"], answer: 0 },
    { question: "«Қырдың гүлі азайса, ... қонар бұлбұл құс».", options: ["Тасқа", "Тікенге", "Ағашқа", "Шөпке"], answer: 1 },
    { question: "«Ауыр қайғы бөлісу – ... парызы».", options: ["Достың", "Ағайынның", "Елдің", "Баланың"], answer: 1 },
    { question: "«Ауыр жүкті көтеру – ... қарызы».", options: ["Жігіттің", "Ақ атанның", "Пілдің", "Түйенің"], answer: 1 },
    { question: "«Беттің арын ... түйме».", options: ["Қалтаға", "Белбеуге", "Етекке", "Жерге"], answer: 1 },
    { question: "«Етпен келген ауру, ... кетеді».", options: ["Сумен", "Сүйекпен", "Дәрімен", "Желмен"], answer: 1 },
    { question: "Абайдың «Билер ережесінде» жала жапқандарға неше күн абақты берілген?", options: ["7", "14", "28", "40"], answer: 2 },
    // ... Қалған 100 сұрақты да осы жерге қосуға болады
];

let currentIndex = 0;
let score = 0;

function loadQuestion() {
    if (currentIndex >= questions.length) {
        showResult();
        return;
    }

    const q = questions[currentIndex];
    document.getElementById("progress").innerText = `Сұрақ: ${currentIndex + 1} / ${questions.length}`;
    document.getElementById("question").innerText = q.question;
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => selectOption(index, btn);
        optionsDiv.appendChild(btn);
    });
}

function selectOption(selectedIndex, selectedBtn) {
    const q = questions[currentIndex];
    const allButtons = document.querySelectorAll(".option-btn");

    // Барлық батырмаларды бұғаттау
    allButtons.forEach(btn => btn.disabled = true);

    if (selectedIndex === q.answer) {
        // Дұрыс жауап
        selectedBtn.classList.add("correct");
        score++;
    } else {
        // Қате жауап
        selectedBtn.classList.add("wrong");
        // Дұрыс жауапты көрсету
        allButtons[q.answer].classList.add("correct");
    }

    // 1.5 секундтан кейін автоматты түрде келесі сұраққа көшу
    setTimeout(() => {
        currentIndex++;
        loadQuestion();
    }, 1500);
}

function showResult() {
    document.getElementById("quiz-content").style.display = "none";
    document.getElementById("score-container").style.display = "block";
    document.getElementById("final-score").innerText = score;
    document.getElementById("score-text").innerText = 
        `Барлығы ${questions.length} сұрақтан ${score} ұпай жинадыңыз.`;
}

// Тестті бастау
loadQuestion();
</script>

</body>
</html>
